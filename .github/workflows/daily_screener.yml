name: Daily Taiwan Stock Screener

on:
  schedule:
    # Start earlier because the strategy no longer waits for institutional data as a hard gate.
    # 17:17/17:47/18:17/18:47/19:17 Asia/Taipei = 09:17/09:47/10:17/10:47/11:17 UTC.
    # The script uses --skip-if-sent, so catch-up slots will not send duplicate reports.
    - cron: "17 9 * * *"
    - cron: "47 9 * * *"
    - cron: "17 10 * * *"
    - cron: "47 10 * * *"
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TZ: Asia/Taipei
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ${{ secrets.GMAIL_USER }}
      SMTP_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      EMAIL_FROM: ${{ secrets.GMAIL_USER }}
      EMAIL_TO: ${{ secrets.GMAIL_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener and send email report
        run: python tw_stock_screener.py --skip-if-sent

      - name: Persist screener journal
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_journal.csv reports/*.html sent_reports/*.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update screener journal"
            git pull --rebase
            git push
          else
            echo "No screener journal changes to persist."
          fi

      - name: Upload latest report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-screener-report
          path: |
            last_report.txt
            trade_journal.csv
            reports/*.html
          if-no-files-found: ignore
